name: Build and Push Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-and-push:
    # Only run on the forked repo, not the original
    if: github.repository == 'Xiao-Hannah/microgrid'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/solarease-api:latest,${{ secrets.ACR_LOGIN_SERVER }}/solarease-api:${{ github.sha }}
